<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Nexus Laptops Botswana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
            <article class="container">
                <a class="navbar-brand fw-bold fs-3" href="index.html">NEXUS</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <article class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="gaming.html">Gaming</a></li>
                        <li class="nav-item"><a class="nav-link" href="work.html">Work</a></li>
                        <li class="nav-item"><a class="nav-link" href="hybrid.html">Hybrid</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                    </ul>
                </article>
            </article>
        </nav>
    </header>

    <main>
        <section class="hero text-center text-white d-flex align-items-center" style="background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('contact-hero.jpg') center/cover no-repeat; height: 60vh; margin-top: 56px;">
            <article class="container">
                <h1 class="display-4 fw-bold">Get In Touch</h1>
                <p class="lead">We are here to help you choose the right laptop</p>
            </article>
        </section>

        <section class="py-5">
            <article class="container">
                <article class="col-lg-8 mx-auto">
                    <form>
                        <article class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" required>
                        </article>
                        <article class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required>
                        </article>
                        <article class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control">
                        </article>
                        <article class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="6" required></textarea>
                        </article>
                        <button type="submit" class="btn btn-danger btn-lg">Send Message</button>
                    </form>
                </article>
            </article>
        </section>
    </main>

    <footer class="bg-dark text-white py-5">
        <article class="container">
            <p class="text-center mb-0">&copy; 2026 Nexus Core Systems. All Rights Reserved.</p>
        </article>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
   <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            alert("✅ MESSAGE RECEIVED!\n\nThank you for your input.\nWe'll get back to you soon!");
            this.reset();
        });
    </script>
</body>
</html>
